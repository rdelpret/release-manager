name = "music-release-planner"
main = "src/index.ts"
compatibility_date = "2025-09-01"
account_id = "9273f425d8ef36e523a3db0fe88cba0b"

routes = [
  { pattern = "release.rdelpret.com/*", zone_name = "rdelpret.com" },
]

[observability]
enabled = true

[assets]
directory = "./frontend/out"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/auth/*", "/campaign/*"]

[[containers]]
class_name = "Backend"
image = "./backend/Dockerfile"
max_instances = 1

[[durable_objects.bindings]]
class_name = "Backend"
name = "BACKEND"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["Backend"]
