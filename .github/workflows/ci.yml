name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-go:
    name: Go Tests & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Build
        working-directory: backend
        run: go build ./...

      - name: Run Go unit tests
        working-directory: backend
        run: go test ./internal/auth/ -v -count=1

      - name: Lint Go code
        working-directory: backend
        run: go vet ./...

  test-frontend:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: NODE_ENV=production npm run build

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: mrp_test
        ports:
          - 5555:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright
        working-directory: frontend
        run: npx playwright install chromium

      - name: Run migrations
        run: psql "$DATABASE_URL" -f backend/migrations/001_initial.sql
        env:
          DATABASE_URL: postgresql://test:test@localhost:5555/mrp_test?sslmode=disable

      - name: Build and start backend
        working-directory: backend
        run: |
          go build -o ../bin/test-server ./cmd/server/main.go
          ../bin/test-server &
          sleep 2
          curl -sf http://localhost:8080/api/health
        env:
          DATABASE_URL: postgresql://test:test@localhost:5555/mrp_test?sslmode=disable
          SESSION_SECRET: ci-test-secret-not-real
          ALLOWED_EMAILS: dev@subwave.music
          FRONTEND_URL: http://localhost:3000
          ENV: development
          PORT: "8080"

      - name: Run Playwright tests
        working-directory: frontend
        run: npx playwright test --reporter=github
        env:
          DATABASE_URL: postgresql://test:test@localhost:5555/mrp_test?sslmode=disable
          SESSION_SECRET: ci-test-secret-not-real
          ALLOWED_EMAILS: dev@subwave.music
          FRONTEND_URL: http://localhost:3000
          ENV: development

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/test-results/

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Scan for secrets
        run: |
          npx -y ship-safe@latest scan --json . 2>/dev/null > /tmp/scan.json || true
          node -e "
            const r = JSON.parse(require('fs').readFileSync('/tmp/scan.json','utf8'));
            const skip = ['.env.example','scripts/','workflows/','plans/'];
            const real = (r.findings||[]).filter(f => !skip.some(s => f.file.includes(s)));
            if (real.length > 0) { console.log(JSON.stringify({...r, findings: real}, null, 2)); process.exit(1); }
            console.log('No real secrets found (' + r.filesScanned + ' files scanned)');
          "

      - name: Audit dependencies for CVEs
        run: npx -y ship-safe@latest deps .
