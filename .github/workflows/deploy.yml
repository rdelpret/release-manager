name: Deploy to Cloudflare
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: NODE_ENV=production npm run build

      - name: Upload secrets
        run: |
          echo "$DATABASE_URL" | npx wrangler secret put DATABASE_URL
          echo "$GOOGLE_CLIENT_ID" | npx wrangler secret put GOOGLE_CLIENT_ID
          echo "$GOOGLE_CLIENT_SECRET" | npx wrangler secret put GOOGLE_CLIENT_SECRET
          echo "$SESSION_SECRET" | npx wrangler secret put SESSION_SECRET
          echo "$ALLOWED_EMAILS" | npx wrangler secret put ALLOWED_EMAILS
          echo "$OAUTH_REDIRECT_URL" | npx wrangler secret put OAUTH_REDIRECT_URL
          echo "$FRONTEND_URL" | npx wrangler secret put FRONTEND_URL
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          ALLOWED_EMAILS: ${{ secrets.ALLOWED_EMAILS }}
          OAUTH_REDIRECT_URL: ${{ secrets.OAUTH_REDIRECT_URL }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
